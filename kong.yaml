_format_version: "3.0"

services:
  - name: sakura-ai-chat-service
    url: http://localhost
    routes:
      - name: sakura-ai-chat-completions-route
        paths:
          - /v1/chat/completions
        strip_path: false
    plugins:
      - name: key-auth
        config:
          key_names:
            - x-api-key
          key_in_header: true
          key_in_query: false
          key_in_body: false
          hide_credentials: true
      - name: ai-proxy
        config:
          route_type: llm/v1/chat
          max_request_body_size: 131072
          auth:
            header_name: Authorization
            header_value: "{vault://env/sakura-ai-auth-header}"
          model:
            provider: openai
            options:
              upstream_url: https://api.ai.sakura.ad.jp/v1/chat/completions

consumers:
  - username: opencode
    keyauth_credentials:
      - key: REPLACE_WITH_A_LONG_RANDOM_API_KEY
